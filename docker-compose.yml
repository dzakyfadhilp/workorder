# Docker Compose for Workorder API
# No version needed for Docker Compose v2+

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: workorder-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workorder_db
    ports:
      - "5433:5432"  # Host:Container - Changed to 5433 to avoid conflict
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - workorder-network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: workorder-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - workorder-network

  # API Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workorder-api
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432  # Internal container port (tidak berubah)
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: workorder_db
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      # Server
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - workorder-network

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  workorder-network:
    driver: bridge
