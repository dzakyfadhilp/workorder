# Development docker-compose with hot reload
# No version needed for Docker Compose v2+

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: workorder-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workorder_db
    ports:
      - "5433:5432"  # Host:Container - Changed to 5433 to avoid conflict
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - workorder-network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: workorder-rabbitmq-dev
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_dev_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - workorder-network

  # API Application (Development mode - no build, run locally)
  # Just use: go run main.go
  # This compose file only runs dependencies

volumes:
  postgres_dev_data:
    driver: local
  rabbitmq_dev_data:
    driver: local

networks:
  workorder-network:
    driver: bridge
